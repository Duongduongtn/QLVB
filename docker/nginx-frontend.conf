# Config Nginx cho container frontend serve file tĩnh.
# SPA fallback: mọi route không-file đều trả index.html cho React Router xử lý.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache asset có hash
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck nội bộ
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
