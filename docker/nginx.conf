# Reverse proxy chính (chạy trên host hoặc container ngoài stack QLCV).
# Mục đích: terminate SSL (Let's Encrypt) + route /api → backend, còn lại → frontend.
#
# File này KHÔNG được docker-compose load — đặt vào /etc/nginx/sites-available
# trên VPS host hoặc include vào nginx dùng chung của 6 dự án.

upstream qlcv_backend {
    server qlcv_backend:8003;
}

upstream qlcv_frontend {
    server qlcv_frontend:80;
}

server {
    listen 80;
    server_name qlcv.example.com;   # TODO: subdomain thực tế

    # Let's Encrypt + redirect HTTPS — bỏ comment khi cấp cert xong.
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://qlcv_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream PDF/file lớn — không buffer
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100M;          # CV scan lớn (giới hạn upload ở backend cũng)
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://qlcv_frontend;
        proxy_set_header Host $host;
    }
}
